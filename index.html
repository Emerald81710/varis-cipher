<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARIS</title>
    <style>
        :root{--bg-color:#060a12;--card-bg:#090f1a;--accent:#10b981;--accent-dim:rgba(16,185,129,0.2);--text-light:#e2e8f0;--border:#1e293b;--text:#94a3b8;}
        body{font-family:'Courier New',Courier,monospace;background-color:var(--bg-color);background-image:linear-gradient(rgba(18,24,38,0) 50%,rgba(0,0,0,0.25) 50%),linear-gradient(90deg,rgba(255,0,0,0.03),rgba(0,255,0,0.01),rgba(0,255,0,0.03));background-size:100% 4px,6px 100%;color:var(--text-light);margin:0;padding:40px 20px;display:flex;flex-direction:column;align-items:center;min-height:100vh;box-sizing:border-box;}
        .container{max-width:650px;width:100%;background:var(--card-bg);padding:35px;border-radius:12px;border:1px solid #1e293b;box-shadow:0 20px 40px rgba(0,0,0,0.7),inset 0 0 20px rgba(16,185,129,0.03);}
        h1{text-align:center;color:var(--accent);margin:0 0 25px;letter-spacing:4px;font-size:28px;font-weight:bold;text-shadow:0 0 10px var(--accent-dim);animation:textGlow 4s infinite alternate;cursor:pointer;user-select:none;}
        @keyframes textGlow { 0% { text-shadow: 0 0 8px rgba(16, 185, 129, 0.3); } 100% { text-shadow: 0 0 18px rgba(16, 185, 129, 0.6); } }
        .input-group { position: relative; margin-bottom: 20px; }
        label { display: block; margin: 0 0 8px 4px; font-weight: bold; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: #64748b; }
        textarea {
            width: 100%; height: 130px; padding: 15px; border-radius: 6px; border: 1px solid #131e31;
            background-color: #04070d; color: var(--text-light); font-size: 16px; box-sizing: border-box;
            resize: vertical; font-family: inherit; transition: all 0.25s ease; box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
        }
        textarea:focus { outline: none; border-color: rgba(16, 185, 129, 0.5); box-shadow: 0 0 12px rgba(16, 185, 129, 0.15), inset 0 2px 8px rgba(0,0,0,0.8); color: #fff; }
        textarea::placeholder { color: #334155; }
        .control-panel {
            display: flex; justify-content: center; align-items: center; margin: 20px 0; gap: 15px;
            padding: 12px; background: #04070d; border: 1px solid #131e31; border-radius: 6px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .shift-label { margin: 0; font-size: 13px; font-weight: bold; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; }
        input[type="number"] { width: 70px; background: #090f1a; border: 1px solid #1e293b; color: #fff; padding: 8px; font-family: inherit; font-size: 16px; text-align: center; border-radius: 4px; }
        input[type="number"]:focus { outline: none; border-color: var(--accent); }
        .legend { margin-top: 30px; padding-top: 20px; border-top: 1px dashed #1e293b; font-size: 11px; color: #475569; text-align: center; line-height: 1.6; letter-spacing: 0.5px; }
        
        .secret-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(4,7,13,0.85);backdrop-filter:blur(6px);z-index:10000;justify-content:center;align-items:center;box-sizing:border-box;transition:transform 0.1s ease;}
        .modal-content{background:var(--card-bg);color:var(--text-light);padding:35px;border-radius:12px;border:2px solid var(--accent);text-align:center;box-shadow:0 0 30px rgba(16,185,129,0.2);max-width:450px;width:90%;box-sizing:border-box;}
        #secret-panel .modal-content{max-width:500px;}
        .modal-content h3{margin-top:0;letter-spacing:2px;color:var(--accent);text-transform:uppercase;}
        .modal-content input{background:#04070d;border:1px solid #131e31;color:#fff;padding:12px;text-align:center;font-size:16px;margin-bottom:20px;border-radius:6px;width:100%;box-sizing:border-box;font-family:inherit;}
        .modal-content input:focus{outline:none;border-color:var(--accent);}
        .button-group{display:flex;justify-content:center;gap:10px;}
        .modal-btn{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent);padding:10px 20px;cursor:pointer;font-weight:bold;border-radius:6px;font-family:inherit;transition:all 0.2s ease;text-transform:uppercase;font-size:12px;letter-spacing:1.5px;}
        .modal-btn:hover{background:var(--accent);color:var(--bg-color);box-shadow:0 0 10px var(--accent-dim);}
        #error-message{color:#ef4444;font-size:12px;margin-top:15px;letter-spacing:1px;}
        .hidden{display:none;}
    </style>
</head>
<body>
    <div class="container">
        <h1 onclick="openCodePanel()">[ VARIS ]</h1>
        <div class="input-group">
            <label for="englishInput">Plaintext (English & Numbers):</label>
            <textarea id="englishInput" placeholder="Type message here..."></textarea>
        </div>
        <div class="control-panel">
            <span class="shift-label">CIPHER KEY:</span>
            <input type="number" id="shiftInput" value="0" min="0" max="26">
        </div>
        <div class="input-group">
            <label for="varisInput">VARIS Ciphertext:</label>
            <textarea id="varisInput" placeholder="Cipher stream will appear here..."></textarea>
        </div>
        <div class="legend">Note: Numbers require mode switches. System auto-wraps numbers in “ and ‘.<br>Spaces are included in the shifting alphabet (Positions 1-27).</div>
    </div>

    <div id="code-panel" class="secret-modal">
        <div class="modal-content">
            <h3>-:!\:{+&,%:)</h3>
            <input type="password" id="cipher-code-input" placeholder=":%{:\+,!!:--+!^;:">
            <div class="button-group">
                <button class="modal-btn" onclick="checkCode()">!^%~$\=</button>
                <button class="modal-btn" onclick="closeCodePanel()">!,%!:)</button>
            </div>
            <p id="error-message" class="hidden">,!!:--+;:%$:;.+$%<,)$;+!):,\,%!:.</p>
        </div>
    </div>
    <div id="secret-panel" class="secret-modal">
        <div class="modal-content">
            <h3 id="glitch-header">-:!\:{+&,%:)</h3>
            
            <div style="background:#02050a;border:1px solid var(--border);border-radius:6px;padding:20px;margin:20px 0;text-align:left;">
                <label style="color:#64748b;font-size:11px;display:block;margin-bottom:12px;letter-spacing:2px;font-weight:bold;">[ ^{#:\+!$&#:\- ]</label>
                
                <div style="display:flex;flex-direction:column;gap:10px;">
                    <a href="https://emerald81710.github.io/vectra-translator/" target="_blank" class="modal-btn" style="text-decoration:none;text-align:center;display:block;">[ VECTRA ]</a>
                    <a href="https://github.io" target="_blank" class="modal-btn" style="text-decoration:none;text-align:center;display:block;">[ N/A ]</a>
                </div>
            </div>

            <div class="button-group">
                <button class="modal-btn" onclick="closeSecretPanel()">!)^-:</button>
            </div>
        </div>
    </div>

    <script>
        const alphabetOrder=[...'ABCDEFGHIJKLMNOPQRSTUVWXYZ '],numberOrder=[...'1234567890'],symbols=".,?!;:~@#$*()=%^&/\\-{}<>[ ]+_";
        const englishInput=document.getElementById('englishInput'),varisInput=document.getElementById('varisInput'),shiftInput=document.getElementById('shiftInput');
        function getShift(){return parseInt(shiftInput.value)||0;}

        function encodeText(){
            const text=englishInput.value.toUpperCase(),shift=getShift();let result='',inNum=false;
            for(let char of text){
                if(/[0-9]/.test(char)){if(!inNum){result+='“';inNum=true;}let idx=(numberOrder.indexOf(char)+shift)%10;result+=symbols[idx<0?idx+11:idx+1];}
                else if(/[A-Z ]/.test(char)){if(inNum){result+='‘';inNum=false;}let idx=(alphabetOrder.indexOf(char)+shift)%27;result+=symbols[idx<0?idx+28:idx+1];}
                else{if(inNum){result+='‘';inNum=false;}result+=char;}
            }
            if(inNum)result+='‘';varisInput.value=result;
        }

        function decodeText(){
            const text=varisInput.value,shift=getShift();let result='',isNum=false;
            for(let char of text){
                if(char==='“'){isNum=true;continue;}if(char==='‘'){isNum=false;continue;}
                let symIdx=symbols.indexOf(char);
                if(symIdx!==-1){
                    let rawIdx=symIdx-1;
                    if(isNum){let idx=(rawIdx-shift)%10;result+=numberOrder[idx<0?idx+10:idx];}
                    else{let idx=(rawIdx-shift)%27;result+=alphabetOrder[idx<0?idx+27:idx];}
                }else{result+=char;}
            }
            englishInput.value=result.toLowerCase();
        }

        englishInput.addEventListener('input',encodeText);varisInput.addEventListener('input',decodeText);shiftInput.addEventListener('input',encodeText);

        const SECRET_CODE="81710";
        function playChime(){
            try{let ctx=new(window.AudioContext||window.webkitAudioContext)(),t=0;
            [523,659,784,1046].forEach(f=>{setTimeout(()=>{let o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.1,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.3);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+0.3);},t);t+=70;});}catch(e){}
        }

        function openCodePanel(){document.getElementById('code-panel').style.display='flex';document.getElementById('cipher-code-input').focus();}
        function closeCodePanel(){document.getElementById('code-panel').style.display='none';document.getElementById('cipher-code-input').value='';document.getElementById('error-message').classList.add('hidden');}
        
        function checkCode(){
            const inp=document.getElementById('cipher-code-input'),err=document.getElementById('error-message'),panel=document.getElementById('code-panel');
            if(inp.value===SECRET_CODE){closeCodePanel();openSecretPanel();}
            else{err.classList.remove('hidden');inp.value='';panel.style.transform='translateX(12px)';setTimeout(()=>panel.style.transform='translateX(-12px)',70);setTimeout(()=>panel.style.transform='translateX(6px)',140);setTimeout(()=>panel.style.transform='translateX(0)',210);}
        }

        function openSecretPanel(){
            document.getElementById('secret-panel').style.display='flex';
            document.getElementById('secret-panel').style.background='radial-gradient(circle,#052214 0%,#020408 100%)';
            playChime();runGlitchEffect();
        }
        function closeSecretPanel(){document.getElementById('secret-panel').style.display='none';}
        document.getElementById('cipher-code-input').addEventListener('keypress',(e)=>{if(e.key==='Enter')checkCode();});

        function runGlitchEffect(){
            const el=document.getElementById('glitch-header'),target="-:!\:{+&,%:)";let iter=0;clearInterval(el.interval);
            el.interval=setInterval(()=>{el.innerText=target.split("").map((c,i)=>{if(i<iter)return target[i];return symbols[Math.floor(Math.random()*symbols.length)];}).join("");if(iter>=target.length)clearInterval(el.interval);iter+=1/3;},40);
        }
    </script>
</body>
</html>
